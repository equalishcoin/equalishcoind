services:
  equalishcoind:
    build:
      context: ..
      dockerfile: contrib/Dockerfile.nogui
      args:
        MAKE_JOBS: "4"
    container_name: equalishcoind
    user: "1000:1000"
    restart: unless-stopped
    environment:
      EQUALISHCOIN_DATA_DIR: /home/equalishcoin/.equalishcoin
      EQUALISHCOIN_CONF: /home/equalishcoin/.equalishcoin/equalishcoin.conf
      COIND_RPC_USER: "${COIND_RPC_USER:-eqlsrpc}"
      COIND_RPC_PASSWORD: "${COIND_RPC_PASSWORD:-change-me-now}"
      COIND_P2P_PORT: "${COIND_P2P_PORT:-19901}"
      COIND_RPC_PORT: "${COIND_RPC_PORT:-19902}"
      COIND_RPC_BIND: "${COIND_RPC_BIND:-0.0.0.0}"
      COIND_RPC_ALLOW_IP: "${COIND_RPC_ALLOW_IP:-0.0.0.0/0}"
      COIND_TXINDEX: "${COIND_TXINDEX:-1}"
      COIND_PRUNE: "${COIND_PRUNE:-0}"
      COIND_MAXCONNECTIONS: "${COIND_MAXCONNECTIONS:-64}"
      COIND_EXTRA_ARGS: "${COIND_EXTRA_ARGS:--wallet=bootstrap}"
    ports:
      - "${COIND_P2P_PORT:-19901}:${COIND_P2P_PORT:-19901}"
      # Uncomment only if you really want host RPC access.
      # - "${COIND_RPC_PORT:-19902}:${COIND_RPC_PORT:-19902}"
    expose:
      - "${COIND_P2P_PORT:-19901}"
      - "${COIND_RPC_PORT:-19902}"
    volumes:
      - ./dot-equalishcoin:/home/equalishcoin/.equalishcoin
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "equalishcoin-cli -datadir=\"$${EQUALISHCOIN_DATA_DIR}\" -conf=\"$${EQUALISHCOIN_CONF}\" getblockchaininfo >/dev/null"
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  equalishcoin-bootstrap-miner:
    profiles:
      - bootstrap
    build:
      context: ..
      dockerfile: contrib/Dockerfile.nogui
      args:
        MAKE_JOBS: "4"
    depends_on:
      equalishcoind:
        condition: service_healthy
    user: "1000:1000"
    restart: "no"
    environment:
      COIND_RPC_USER: "${COIND_RPC_USER:-eqlsrpc}"
      COIND_RPC_PASSWORD: "${COIND_RPC_PASSWORD:-change-me-now}"
      COIND_RPC_PORT: "${COIND_RPC_PORT:-19902}"
      BOOTSTRAP_BLOCKS: "${BOOTSTRAP_BLOCKS:-200}"
    entrypoint:
      - /bin/bash
      - -lcx
      - |
        set -euo pipefail
        CLI="equalishcoin-cli -rpcconnect=equalishcoind -rpcport=$${COIND_RPC_PORT} -rpcuser=$${COIND_RPC_USER} -rpcpassword=$${COIND_RPC_PASSWORD}"

        rpc_retry() {
          local attempt=0
          local max_attempts=30
          while (( attempt < max_attempts )); do
            if $$CLI "$@"; then
              return 0
            fi
            attempt=$$((attempt + 1))
            sleep 1
          done
          echo "RPC command failed after $${max_attempts} attempts: $*" >&2
          return 1
        }

        until rpc_retry getblockchaininfo >/dev/null 2>&1; do sleep 2; done
        if ! rpc_retry listwallets | grep -q '"bootstrap"'; then
          rpc_retry createwallet "bootstrap" >/dev/null 2>&1 || rpc_retry loadwallet "bootstrap" >/dev/null 2>&1 || true
        fi
        ADDR="$$(rpc_retry -rpcwallet=bootstrap getnewaddress | tail -n 1)"
        START_HEIGHT=$$(rpc_retry getblockchaininfo | grep '"blocks"' | grep -o '[0-9]*')
        TARGET=$(( START_HEIGHT + $${BOOTSTRAP_BLOCKS} ))
        echo "Bootstrap mining from height $${START_HEIGHT} to $${TARGET}"
        while true; do
          CURRENT=$$(rpc_retry getblockchaininfo | grep '"blocks"' | grep -o '[0-9]*')
          (( CURRENT >= TARGET )) && break
          rpc_retry -rpcwallet=bootstrap generatetoaddress 1 "$$ADDR" >/dev/null
        done
        echo "Bootstrap mining complete at height $${TARGET}"
