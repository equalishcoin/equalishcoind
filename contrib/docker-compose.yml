services:
  equalishcoind:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: contrib/Dockerfile.nogui
      args:
        MAKE_JOBS: "4"
    container_name: equalishcoind
    restart: unless-stopped
    environment:
      EQUALISHCOIN_DATA_DIR: /home/equalishcoin/.equalishcoin
      EQUALISHCOIN_CONF: /home/equalishcoin/.equalishcoin/equalishcoin.conf
      COIND_RPC_USER: "${COIND_RPC_USER:-eqlsrpc}"
      COIND_RPC_PASSWORD: "${COIND_RPC_PASSWORD:-change-me-now}"
      COIND_P2P_PORT: "${COIND_P2P_PORT:-19901}"
      COIND_RPC_PORT: "${COIND_RPC_PORT:-19902}"
      COIND_RPC_BIND: "${COIND_RPC_BIND:-0.0.0.0}"
      COIND_RPC_ALLOW_IP: "${COIND_RPC_ALLOW_IP:-0.0.0.0/0}"
      COIND_TXINDEX: "${COIND_TXINDEX:-1}"
      COIND_PRUNE: "${COIND_PRUNE:-0}"
      COIND_MAXCONNECTIONS: "${COIND_MAXCONNECTIONS:-64}"
      COIND_EXTRA_ARGS: "${COIND_EXTRA_ARGS:-}"
    ports:
      - "${COIND_P2P_PORT:-19901}:${COIND_P2P_PORT:-19901}"
      # Uncomment only if you really want host RPC access.
      # - "${COIND_RPC_PORT:-19902}:${COIND_RPC_PORT:-19902}"
    expose:
      - "${COIND_P2P_PORT:-19901}"
      - "${COIND_RPC_PORT:-19902}"
    volumes:
      - ./dot-equalishcoin:/home/equalishcoin/.equalishcoin
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS --user \"$${COIND_RPC_USER}:$${COIND_RPC_PASSWORD}\" --data-binary '{\"jsonrpc\":\"1.0\",\"id\":\"health\",\"method\":\"getblockchaininfo\",\"params\":[]}' -H 'content-type: text/plain;' http://127.0.0.1:$${COIND_RPC_PORT}/ >/dev/null"
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s



  #---
  #-- NOMP
  #---

  redis:
    image: redis:7-alpine
    container_name: zet-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nomp:
    build:
      context: ./nomp
      dockerfile: Dockerfile
    container_name: zet-nomp
    restart: unless-stopped

    environment:
      COIND_HOST: "${COIND_HOST:-equalishcoind}"
      COIND_RPC_USER: "${COIND_RPC_USER:-eqlsrpc}"
      COIND_RPC_PASSWORD: "${COIND_RPC_PASSWORD:-change-me-now}"
      COIND_RPC_PORT: "${COIND_RPC_PORT:-19902}"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      POOL_ADDRESS: "${POOL_ADDRESS:-EXipEW5yf6Kj8Y56iXJdCPDLP3tPqwYSgE}"
      POOL_PUBLIC_HOST: "${POOL_PUBLIC_HOST:-localhost}"
      NOMP_CLI_PORT: "${NOMP_CLI_PORT:-17117}"
      NOMP_STRATUM_PORT_LOW: "${NOMP_STRATUM_PORT_LOW:-3333}"
      NOMP_STRATUM_PORT_MED: "${NOMP_STRATUM_PORT_MED:-5555}"
      NOMP_STRATUM_PORT_HIGH: "${NOMP_STRATUM_PORT_HIGH:-7777}"
      NOMP_WEB_PORT: "${NOMP_WEB_PORT:-8080}"
      NOMP_WEBSITE_ENABLED: "${NOMP_WEBSITE_ENABLED:-false}"
      NOMP_VALIDATE_WORKER_USERNAME: "${NOMP_VALIDATE_WORKER_USERNAME:-false}"

    depends_on:
      equalishcoind:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "${NOMP_STRATUM_PORT_LOW:-3333}:${NOMP_STRATUM_PORT_LOW:-3333}"
      - "${NOMP_STRATUM_PORT_MED:-5555}:${NOMP_STRATUM_PORT_MED:-5555}"
      - "${NOMP_STRATUM_PORT_HIGH:-7777}:${NOMP_STRATUM_PORT_HIGH:-7777}"
      - "${NOMP_WEB_PORT:-8080}:${NOMP_WEB_PORT:-8080}"

    expose:
      - "${NOMP_CLI_PORT:-17117}"

    volumes:
      - ./nomp/config:/config:ro
      - ./nomp/website:/opt/nomp/website:ro
      - ./nomp_config:/opt/nomp/config

    healthcheck:
      test: ["CMD-SHELL", "test -s /opt/nomp/config.json && test -s /opt/nomp/pool_configs/zetacoin.json"]
      interval: 30s
      timeout: 10s
      retries: 20

